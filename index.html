<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAR-WO BLE</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: #18181b;
  color: #f4f4f5;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.panel {
  width: min(100%, 430px);
  background: linear-gradient(180deg, #7a7a74 0%, #53544f 100%);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.45);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.title {
  font-size: 18px;
  font-weight: 700;
}

.ble-status {
  border: 1px solid #3f3f46;
  background: #27272a;
  color: #d4d4d8;
  border-radius: 999px;
  padding: 6px 12px;
  cursor: pointer;
}

.ble-status.connected { color: #86efac; }

.connect-screen {
  background: rgba(24,24,27,0.28);
  border-radius: 20px;
  padding: 26px 18px;
  text-align: center;
}

.connect-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 10px;
}

.connect-text {
  color: #e4e4e7;
  font-size: 14px;
  line-height: 1.4;
  margin-bottom: 22px;
}

.connect-btn {
  appearance: none;
  border: 1px solid #bef264;
  background: linear-gradient(180deg, #383a2d 0%, #1f2119 100%);
  color: #f7fee7;
  border-radius: 18px;
  font-size: 18px;
  font-weight: 800;
  padding: 16px 22px;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -4px 10px rgba(0,0,0,0.35),
    0 0 0 2px rgba(190,242,100,0.18);
}

.connect-btn:active { transform: scale(0.98); }

.controls { display: none; }
.controls.visible { display: block; }

.sliders {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  background: rgba(24,24,27,0.28);
  border-radius: 20px;
  padding: 18px 10px;
}

.slider-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.value {
  font-size: 20px;
  font-weight: 700;
}

label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.step-btn {
  appearance: none;
  width: 42px;
  height: 42px;
  border-radius: 999px;
  border: 1px solid #4f4f46;
  background: linear-gradient(180deg, #2d2e31 0%, #17181b 100%);
  color: #fafafa;
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -4px 10px rgba(0,0,0,0.35),
    0 4px 10px rgba(0,0,0,0.25);
}

.step-btn:active { transform: scale(0.94); }

input[type="range"] {
  writing-mode: bt-lr;
  appearance: slider-vertical;
  width: 38px;
  height: 230px;
  accent-color: #bef264;
}

.fx-wrap {
  position: relative;
  height: 230px;
  width: 70px;
  display: flex;
  justify-content: center;
}

.fx-wrap input {
  position: relative;
  z-index: 2;
}

.fx-line {
  position: absolute;
  left: 4px;
  right: 4px;
  height: 1px;
  background: rgba(255,255,255,0.55);
  z-index: 1;
}

.fx-line.l1 { bottom: 33.33%; }
.fx-line.l2 { bottom: 66.66%; }

.fx-zone {
  position: absolute;
  right: -4px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #e4e4e7;
  opacity: 0.9;
  z-index: 3;
  pointer-events: none;
}

.fx-zone.fade   { bottom: 5%;  }
.fx-zone.toggle { bottom: 39%; }
.fx-zone.strobe { bottom: 72%; }

.hidden { display: none; }

@media (max-width: 390px) {
  .panel { padding: 14px; }
  .sliders { gap: 8px; padding: 14px 6px; }
  input[type="range"], .fx-wrap { height: 210px; }
  .step-btn { width: 38px; height: 38px; }
  label { font-size: 11px; }
}
</style>
</head>

<body>
<div class="panel">
  <div class="topbar">
    <div class="title">PAR-WO Remote</div>
    <button class="ble-status" id="bleStatus">BLE disconnected</button>
  </div>

  <div class="connect-screen" id="connectScreen">
    <div class="connect-title">Connexion BLE</div>
    <div class="connect-text">
      Connecte le PAR-WO avant d’afficher les commandes.
    </div>
    <button class="connect-btn" id="connectBtn" type="button">CONNECT PAR-WO</button>
  </div>

  <div class="controls" id="controls">
    <div class="sliders">
      <div class="slider-block">
        <div class="value" id="whtVal">0</div>
        <button class="step-btn" type="button" data-key="white" data-delta="1">+</button>
        <input id="wht" type="range" min="0" max="255" value="0">
        <button class="step-btn" type="button" data-key="white" data-delta="-1">−</button>
        <label>WHITE</label>
      </div>

      <div class="slider-block">
        <div class="value" id="orgVal">0</div>
        <button class="step-btn" type="button" data-key="orange" data-delta="1">+</button>
        <input id="org" type="range" min="0" max="255" value="0">
        <button class="step-btn" type="button" data-key="orange" data-delta="-1">−</button>
        <label>ORANGE</label>
      </div>

      <div class="slider-block">
        <div class="value" id="mstVal">255</div>
        <button class="step-btn" type="button" data-key="master" data-delta="1">+</button>
        <input id="mst" type="range" min="0" max="255" value="255">
        <button class="step-btn" type="button" data-key="master" data-delta="-1">−</button>
        <label>MASTER</label>
      </div>

      <div class="slider-block">
        <div class="value" id="fxVal">0</div>
        <button class="step-btn" type="button" data-key="fx" data-delta="1">+</button>

        <div class="fx-wrap">
          <input id="fx" type="range" min="0" max="255" value="0">

          <div class="fx-line l1"></div>
          <div class="fx-line l2"></div>

          <div class="fx-zone fade">FADE</div>
          <div class="fx-zone toggle">TOGGLE</div>
          <div class="fx-zone strobe">STROBE</div>
        </div>

        <button class="step-btn" type="button" data-key="fx" data-delta="-1">−</button>
        <label>FX</label>
      </div>
    </div>
  </div>
</div>

<script>
const BLE_SERVICE_UUID = '19b10000-e8f2-537e-4f6c-d104768a1214';
const BLE_STATE_CHAR_UUID = '19b10001-e8f2-537e-4f6c-d104768a1214';

let bleDevice = null;
let gattServer = null;
let stateChar = null;
let isConnecting = false;

let writeInProgress = false;
let writeAgain = false;
let sendTimer = null;

const state = {
  white: 0,
  orange: 0,
  master: 255,
  fx: 0
};

const sliders = {
  white: document.getElementById('wht'),
  orange: document.getElementById('org'),
  master: document.getElementById('mst'),
  fx: document.getElementById('fx')
};

const values = {
  white: document.getElementById('whtVal'),
  orange: document.getElementById('orgVal'),
  master: document.getElementById('mstVal'),
  fx: document.getElementById('fxVal')
};

const bleStatus = document.getElementById('bleStatus');
const connectBtn = document.getElementById('connectBtn');
const connectScreen = document.getElementById('connectScreen');
const controls = document.getElementById('controls');

function clamp8(v) {
  return Math.max(0, Math.min(255, Number(v) || 0));
}

function setConnectedUI(connected) {
  bleStatus.textContent = connected ? 'BLE connected' : 'BLE disconnected';
  bleStatus.classList.toggle('connected', connected);
  connectScreen.classList.toggle('hidden', connected);
  controls.classList.toggle('visible', connected);
}

function updateUI() {
  sliders.white.value = state.white;
  sliders.orange.value = state.orange;
  sliders.master.value = state.master;
  sliders.fx.value = state.fx;

  values.white.textContent = state.white;
  values.orange.textContent = state.orange;
  values.master.textContent = state.master;
  values.fx.textContent = state.fx;
}

function buildPayload() {
  return new Uint8Array([
    state.white,
    state.orange,
    state.master,
    state.fx
  ]);
}

function decodePayload(data) {
  if (!data || data.length < 4) return;

  state.white  = data[0];
  state.orange = data[1];
  state.master = data[2];
  state.fx     = data[3];

  updateUI();
}

function scheduleSendState() {
  updateUI();

  clearTimeout(sendTimer);

  sendTimer = setTimeout(() => {
    sendStateQueued();
  }, 40);
}

async function sendStateQueued() {
  if (!stateChar || !gattServer?.connected) return;

  if (writeInProgress) {
    writeAgain = true;
    return;
  }

  writeInProgress = true;

  try {
    do {
      writeAgain = false;

      const payload = buildPayload();

      if (stateChar.writeValueWithResponse) {
        await stateChar.writeValueWithResponse(payload);
      } else {
        await stateChar.writeValue(payload);
      }

    } while (writeAgain);

  } catch (err) {
    console.error(err);
    bleStatus.textContent = 'BLE write error';
    bleStatus.classList.remove('connected');
  } finally {
    writeInProgress = false;
  }
}

async function requestCurrentState() {
  if (!stateChar) return;

  try {
    const value = await stateChar.readValue();
    const data = new Uint8Array(value.buffer.slice(0, 4));
    decodePayload(data);
  } catch (err) {
    console.warn('Read failed', err);
  }
}

function handleNotification(event) {
  const value = event.target.value;
  const data = new Uint8Array(value.buffer.slice(0, 4));
  decodePayload(data);
}

function handleDisconnected() {
  stateChar = null;
  gattServer = null;
  setConnectedUI(false);
}

async function connectBle() {
  if (isConnecting) return;

  if (!navigator.bluetooth) {
    alert('Web Bluetooth non supporté. Utilise Chrome ou Edge en HTTPS.');
    return;
  }

  isConnecting = true;
  bleStatus.textContent = 'BLE connecting...';
  connectBtn.textContent = 'CONNECTING...';

  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [
        { namePrefix: 'PAR-WO' },
        { services: [BLE_SERVICE_UUID] }
      ]
    });

    bleDevice.addEventListener('gattserverdisconnected', handleDisconnected);

    gattServer = await bleDevice.gatt.connect();
    const service = await gattServer.getPrimaryService(BLE_SERVICE_UUID);
    stateChar = await service.getCharacteristic(BLE_STATE_CHAR_UUID);

    try {
      await stateChar.startNotifications();
      stateChar.addEventListener('characteristicvaluechanged', handleNotification);
    } catch (err) {
      console.warn('Notifications unavailable', err);
    }

    setConnectedUI(true);
    await requestCurrentState();

  } catch (err) {
    console.error(err);
    setConnectedUI(false);
  } finally {
    isConnecting = false;
    connectBtn.textContent = 'CONNECT PAR-WO';
  }
}

async function toggleBle() {
  if (gattServer?.connected && bleDevice?.gatt?.connected) {
    bleDevice.gatt.disconnect();
    return;
  }

  await connectBle();
}

function setChannel(key, value) {

  if (key === 'white' || key === 'orange') {
    state.fx = 0;
  }

  state[key] = clamp8(value);

  scheduleSendState();
}

sliders.white.addEventListener('input', e => setChannel('white', e.target.value));
sliders.orange.addEventListener('input', e => setChannel('orange', e.target.value));
sliders.master.addEventListener('input', e => setChannel('master', e.target.value));
sliders.fx.addEventListener('input', e => setChannel('fx', e.target.value));

document.querySelectorAll('.step-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    const delta = Number(btn.dataset.delta);
    setChannel(key, state[key] + delta);
  });
});

bleStatus.addEventListener('click', toggleBle);
connectBtn.addEventListener('click', connectBle);

updateUI();
setConnectedUI(false);
</script>
</body>
</html>
